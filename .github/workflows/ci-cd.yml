name: orders-api CI/CD

# Demo pipeline for HP — shows the quality-gated SDLC:
#   build -> static analysis (SonarCloud) -> MUnit + 80% coverage gate -> publish to Exchange -> deploy to CloudHub
# Prod deploy is guarded by a manual GitHub Environment approval.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Dmaven.repo.local=.m2/repository'

jobs:
  # ----------------------------------------------------------------------
  # 1. Build + static analysis + MUnit/coverage gate. Runs on every push/PR.
  # ----------------------------------------------------------------------
  build-test-scan:
    name: Build, Test & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Sonar can attribute new-code issues

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Inject the EE repo + Exchange credentials into a settings.xml for the runner.
      - name: Configure Maven settings
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: >
            [
              { "id": "anypoint-exchange-v3", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}" },
              { "id": "nexus-repo", "username": "${{ secrets.NEXUS_USERNAME }}", "password": "${{ secrets.NEXUS_PASSWORD }}" }
            ]
          repositories: >
            [
              { "id": "anypoint-exchange-v3", "url": "https://maven.anypoint.mulesoft.com/api/v3/maven" },
              { "id": "mulesoft-releases", "url": "https://repository.mulesoft.org/releases/" },
              { "id": "nexus-repo", "url": "https://repository.mulesoft.org/nexus-ee/content/repositories/releases-ee/" }
            ]

      # THE QUALITY GATES: MUnit runs in `mvn verify`; coverage < 80% fails the build
      # (failBuild=true in the pom). Sonar runs in the same pass.
      - name: Build, run MUnit + coverage gate, Sonar scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B clean verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.token=$SONAR_TOKEN

      - name: Upload MUnit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: munit-coverage
          path: target/site/munit/

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: orders-api-jar
          path: target/*.jar

  # ----------------------------------------------------------------------
  # 2. Publish the versioned asset to Anypoint Exchange. Only on main.
  # ----------------------------------------------------------------------
  publish-exchange:
    name: Publish to Exchange
    needs: build-test-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Configure Maven settings
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: >
            [
              { "id": "anypoint-exchange-v3", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}" },
              { "id": "nexus-repo", "username": "${{ secrets.NEXUS_USERNAME }}", "password": "${{ secrets.NEXUS_PASSWORD }}" }
            ]
          repositories: >
            [
              { "id": "anypoint-exchange-v3", "url": "https://maven.anypoint.mulesoft.com/api/v3/maven" },
              { "id": "mulesoft-releases", "url": "https://repository.mulesoft.org/releases/" },
              { "id": "nexus-repo", "url": "https://repository.mulesoft.org/nexus-ee/content/repositories/releases-ee/" }
            ]
      - name: Deploy asset to Exchange
        run: mvn -B clean deploy -DskipMunitTests=true

  # ----------------------------------------------------------------------
  # 3. Deploy to CloudHub. Guarded by the 'production' Environment approval.
  # ----------------------------------------------------------------------
  deploy-cloudhub:
    name: Deploy to CloudHub
    needs: publish-exchange
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production   # configure required reviewers on this env in GitHub -> manual approval gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Configure Maven settings
        uses: whelk-io/maven-settings-xml-action@v22
        with:
          servers: >
            [
              { "id": "anypoint-exchange-v3", "username": "${{ secrets.ANYPOINT_USERNAME }}", "password": "${{ secrets.ANYPOINT_PASSWORD }}" },
              { "id": "nexus-repo", "username": "${{ secrets.NEXUS_USERNAME }}", "password": "${{ secrets.NEXUS_PASSWORD }}" }
            ]
          repositories: >
            [
              { "id": "anypoint-exchange-v3", "url": "https://maven.anypoint.mulesoft.com/api/v3/maven" },
              { "id": "mulesoft-releases", "url": "https://repository.mulesoft.org/releases/" },
              { "id": "nexus-repo", "url": "https://repository.mulesoft.org/nexus-ee/content/repositories/releases-ee/" }
            ]
      - name: Deploy to CloudHub
        run: |
          mvn -B clean deploy -Pcloudhub -DskipMunitTests=true \
            -DconnectedApp.clientId=${{ secrets.CONNECTED_APP_CLIENT_ID }} \
            -DconnectedApp.clientSecret=${{ secrets.CONNECTED_APP_CLIENT_SECRET }} \
            -Dcloudhub.appName=hp-orders-api-demo \
            -Dcloudhub.environment=Sandbox
