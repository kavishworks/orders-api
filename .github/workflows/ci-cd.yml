name: orders-api CI/CD

# Demo pipeline for HP — shows the quality-gated SDLC:
#   build -> static analysis (SonarCloud) -> MUnit + 80% coverage gate -> publish to Exchange -> deploy to CloudHub
# Prod deploy is guarded by a manual GitHub Environment approval.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  # Anypoint Exchange + EE-repo credentials, read by .github/settings.xml via ${env.*}
  ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
  ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
  NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
  NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
  # GitHub Packages creds to resolve the C4E parent POM. GITHUB_ACTOR is provided
  # automatically. GITHUB_TOKEN: the built-in token can read packages, but the parent
  # lives in a DIFFERENT repo (kavishworks/c4e-mule-parent) — if that package is private,
  # grant this repo access to it in the package settings, or replace with a PAT secret
  # that has read:packages (set PACKAGES_TOKEN and swap the line below).
  GITHUB_ACTOR: ${{ github.actor }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# Needed so the built-in GITHUB_TOKEN can read GitHub Packages
permissions:
  contents: read
  packages: read

jobs:
  # ----------------------------------------------------------------------
  # 1. Build + static analysis + MUnit/coverage gate. Runs on every push/PR.
  # ----------------------------------------------------------------------
  build-test-scan:
    name: Build, Test & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so Sonar can attribute new-code issues

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # THE QUALITY GATE: -Pprod activates the C4E parent's prod profile
      # (requiredCoverage=80, failBuild=true) so coverage < 80% FAILS the build.
      # Without -Pprod the parent's safe defaults (0/false) apply and the gate
      # would silently never fire. Sonar runs in the same pass.
      - name: Build, run MUnit + coverage gate, Sonar scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B -s .github/settings.xml -Pprod clean verify \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.token=$SONAR_TOKEN

      - name: Upload MUnit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: munit-coverage
          path: target/site/munit/

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: orders-api-jar
          path: target/*.jar

  # ----------------------------------------------------------------------
  # 2. Publish the versioned asset to Anypoint Exchange. Only on main.
  # ----------------------------------------------------------------------
  publish-exchange:
    name: Publish to Exchange
    needs: build-test-scan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      # Unique version per run so Exchange never rejects a re-publish (assets are immutable)
      - name: Set unique build version
        run: mvn -B versions:set -DnewVersion=1.0.${{ github.run_number }} -DgenerateBackupPoms=false
      - name: Deploy asset to Exchange
        run: mvn -B -s .github/settings.xml clean deploy -DskipMunitTests=true

  # ----------------------------------------------------------------------
  # 3. Deploy to CloudHub. Guarded by the 'production' Environment approval.
  # ----------------------------------------------------------------------
  deploy-cloudhub:
    name: Deploy to CloudHub
    needs: publish-exchange
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production   # configure required reviewers on this env in GitHub -> manual approval gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      # Same version as the publish job so CloudHub deploys the matching artifact
      - name: Set unique build version
        run: mvn -B versions:set -DnewVersion=1.0.${{ github.run_number }} -DgenerateBackupPoms=false
      # `package mule:deploy` deploys straight to CloudHub WITHOUT the maven `deploy`
      # phase (which would try to re-publish to Exchange — already done in the prior job).
      - name: Deploy to CloudHub
        run: |
          mvn -B -s .github/settings.xml clean package mule:deploy -Pcloudhub -DskipMunitTests=true \
            -DconnectedApp.clientId=${{ secrets.CONNECTED_APP_CLIENT_ID }} \
            -DconnectedApp.clientSecret=${{ secrets.CONNECTED_APP_CLIENT_SECRET }} \
            -Dcloudhub.appName=hp-orders-api-demo \
            -Dcloudhub.environment=Sandbox
